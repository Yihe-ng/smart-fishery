<!doctype html>
<html>
  <head>
    <title>frontend-of-smart-fish</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="frontend-of-smart-fish - A modern admin dashboard template built with Vue 3, TypeScript, and Element Plus."
    />
    <link
      rel="icon"
      type="image/svg+xml"
      href="https://api.iconify.design/game-icons/circling-fish.svg?color=%23409eff&v=2"
    />

    <style>
      html {
        background-color: #fafbfc;
      }

      html.dark {
        background-color: #0c1220;
      }
    </style>

    <script>
      ;(function () {
        try {
          if (typeof Storage === 'undefined' || !window.localStorage) {
            return
          }

          const themeMode = localStorage.getItem('sys-theme')
          const prefersDark =
            typeof window.matchMedia === 'function' &&
            window.matchMedia('(prefers-color-scheme: dark)').matches
          const isDark = themeMode === 'dark' || (themeMode === 'auto' && prefersDark)

          document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light')
          document.documentElement.style.colorScheme = isDark ? 'dark' : 'light'

          if (isDark) {
            document.documentElement.classList.add('dark')
          }
        } catch (error) {
          console.warn('Failed to apply initial theme:', error)
        }
      })()
    </script>
  </head>

  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
